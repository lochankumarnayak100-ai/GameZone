<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GameZone — Login</title>
  <link rel="stylesheet" href="auth.css"/>
</head>
<body>

  <!-- Particle canvas -->
  <canvas id="bgCanvas"></canvas>

  <!-- Floating game icons -->
  <div class="floating-icons" aria-hidden="true">
    <span style="--d:0s;  --x:8%;  --y:15%">🎮</span>
    <span style="--d:1.2s;--x:88%; --y:10%">🕹️</span>
    <span style="--d:0.6s;--x:5%;  --y:75%">🏆</span>
    <span style="--d:2s;  --x:92%; --y:70%">🎯</span>
    <span style="--d:1.5s;--x:50%; --y:5%">⭐</span>
    <span style="--d:0.3s;--x:20%; --y:90%">🎲</span>
    <span style="--d:1.8s;--x:75%; --y:88%">🔮</span>
    <span style="--d:0.9s;--x:40%; --y:92%">🚀</span>
  </div>

  <!-- Auth card -->
  <div class="auth-wrap">

    <!-- Brand -->
    <div class="auth-brand">
      <div class="brand-logo">🎮</div>
      <h1>GameZone</h1>
      <p>Your ultimate browser gaming platform</p>
    </div>

    <!-- Card -->
    <div class="auth-card">

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Sign In</button>
        <button class="auth-tab" data-tab="signup">Create Account</button>
      </div>

      <!-- ── LOGIN FORM ── -->
      <form class="auth-form active" id="loginForm" data-tab="login" novalidate>
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrap">
            <span class="input-icon">📧</span>
            <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email"/>
          </div>
          <span class="field-error" id="loginEmailErr"></span>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password"/>
            <button type="button" class="toggle-pw" data-target="loginPassword">👁️</button>
          </div>
          <span class="field-error" id="loginPasswordErr"></span>
        </div>
        <div class="form-row">
          <label class="checkbox-label">
            <input type="checkbox" id="rememberMe"/> Remember me
          </label>
          <button type="button" class="link-btn" id="forgotBtn">Forgot password?</button>
        </div>
        <div class="form-error hidden" id="loginError"></div>
        <button type="submit" class="auth-btn" id="loginBtn">
          <span class="btn-text">Sign In</span>
          <span class="btn-loader hidden">⏳</span>
        </button>
      </form>

      <!-- ── SIGNUP FORM ── -->
      <form class="auth-form" id="signupForm" data-tab="signup" novalidate>
        <div class="form-group">
          <label>Display Name</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="signupName" placeholder="Choose a username" maxlength="20" autocomplete="username"/>
          </div>
          <span class="field-error" id="signupNameErr"></span>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrap">
            <span class="input-icon">📧</span>
            <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email"/>
          </div>
          <span class="field-error" id="signupEmailErr"></span>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="signupPassword" placeholder="Min. 6 characters" autocomplete="new-password"/>
            <button type="button" class="toggle-pw" data-target="signupPassword">👁️</button>
          </div>
          <div class="pw-strength" id="pwStrength">
            <div class="pw-bar"><div class="pw-fill" id="pwFill"></div></div>
            <span id="pwLabel">—</span>
          </div>
          <span class="field-error" id="signupPasswordErr"></span>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="signupConfirm" placeholder="Repeat your password" autocomplete="new-password"/>
            <button type="button" class="toggle-pw" data-target="signupConfirm">👁️</button>
          </div>
          <span class="field-error" id="signupConfirmErr"></span>
        </div>
        <div class="form-group">
          <label>Pick Your Avatar</label>
          <div class="avatar-row" id="authAvatarPicker"></div>
        </div>
        <div class="form-error hidden" id="signupError"></div>
        <button type="submit" class="auth-btn" id="signupBtn">
          <span class="btn-text">Create Account</span>
          <span class="btn-loader hidden">⏳</span>
        </button>
      </form>

      <!-- Divider -->
      <div class="divider"><span>or</span></div>

      <!-- Guest -->
      <button class="guest-btn" id="guestBtn">
        👻 Continue as Guest
        <small>No account needed · Progress not saved</small>
      </button>

    </div><!-- /auth-card -->

    <p class="auth-footer">
      By signing in you agree to our
      <a href="#">Terms of Service</a> &amp; <a href="#">Privacy Policy</a>
    </p>

  </div><!-- /auth-wrap -->

  <!-- Forgot password modal -->
  <div class="fp-overlay hidden" id="fpOverlay">
    <div class="fp-box">
      <button class="fp-close" id="fpClose">✕</button>
      <h3>🔑 Reset Password</h3>
      <p>Enter your email and we'll show your registered account info.</p>
      <div class="input-wrap" style="margin:14px 0">
        <span class="input-icon">📧</span>
        <input type="email" id="fpEmail" placeholder="your@email.com"/>
      </div>
      <div class="form-error hidden" id="fpError"></div>
      <div class="fp-result hidden" id="fpResult"></div>
      <button class="auth-btn" id="fpSubmit">Find Account</button>
    </div>
  </div>

  <!-- Toast -->
  <div id="authToast" class="auth-toast hidden"></div>

  <script src="auth.js"></script>
</body>
</html>
